server:
  port: 8082
  error:
    include-message: always
    include-binding-errors: always

spring:
  application:
    name: application-service
  datasource:
    url: jdbc:mysql://localhost:3306/digibank_app?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

app:
  notification-service:
    url: http://localhost:8086
  document-service:
    url: http://localhost:8085
  affordability-service:
    url: http://localhost:8083

logging:
  level:
    com.digibank: INFO
