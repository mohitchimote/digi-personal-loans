server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:mysql://localhost:3306/digibank_auth?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

app:
  jwt:
    secret: DiGiBaNkIsRaElDeMoSuPeRsEcReTkEy2024XxYyZzAaBbCcDdEeFf1234567890AbCd
    expiration: 86400000

logging:
  level:
    com.digibank: INFO
    org.springframework.security: WARN
