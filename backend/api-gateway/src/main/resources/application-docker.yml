spring:
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns:
              - "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowedHeaders:
              - "*"
            allowCredentials: true
            maxAge: 3600
      routes:
        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/api/auth/**

        - id: branding
          uri: http://auth-service:8081
          predicates:
            - Path=/api/branding/**

        - id: application-service
          uri: http://application-service:8082
          predicates:
            - Path=/api/applications/**

        - id: affordability-service
          uri: http://affordability-service:8083
          predicates:
            - Path=/api/affordability/**

        - id: product-service
          uri: http://product-service:8084
          predicates:
            - Path=/api/products/**

        - id: document-service
          uri: http://document-service:8085
          predicates:
            - Path=/api/documents/**

        - id: notification-service
          uri: http://notification-service:8086
          predicates:
            - Path=/api/notifications/**
