server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowedHeaders:
              - "*"
            allowCredentials: true
            maxAge: 3600
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Headers Access-Control-Allow-Methods Access-Control-Allow-Origin Access-Control-Expose-Headers Access-Control-Max-Age Vary, RETAIN_UNIQUE
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**

        - id: application-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/applications/**

        - id: affordability-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/affordability/**

        - id: product-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/products/**

        - id: document-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/documents/**

        - id: notification-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/notifications/**

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    org.springframework.cloud.gateway: INFO
