<div class="app-shell">
  <app-sidebar [application]="application()" [collapsed]="sidebarCollapsed()"
               basePath="/business" [applicationSteps]="businessSteps" [sectionValues]="sectionValues" />

  <div class="main-content" [class.sidebar-collapsed]="sidebarCollapsed()">
    <header class="portal-header">
      <button class="sidebar-toggle" (click)="toggleSidebar()" title="Toggle menu">
        <span class="material-icons mi-sm">{{ sidebarCollapsed() ? 'menu' : 'close' }}</span>
      </button>
      <div class="portal-header-title">
        <span class="portal-breadcrumb">{{ 'company.businessPortal' | translate }}</span>
      </div>
      <div class="portal-header-right">
        <div class="app-ref" *ngIf="application()">
          {{ 'portal.ref' | translate }} <strong>{{ application()!.applicationRef }}</strong>
        </div>
        <app-language-switcher />
        <div class="header-user">
          <span class="user-avatar-sm">{{ (auth.userFullName || 'U')[0] }}</span>
          <span class="header-name">{{ auth.companyName || auth.userFullName }}</span>
        </div>
      </div>
    </header>

    <div class="page-content">
      <router-outlet />
    </div>
  </div>
</div>
