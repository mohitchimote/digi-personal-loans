<!-- Customer view -->
<div class="application-layout" *ngIf="!identity.isAssisting">
<div class="form-page">
  <div class="form-section-header">
    <div class="section-badge">{{ 'wizard.stepOf' | translate:{ n: 4, total: 9 } }}</div>
    <h2 class="section-title">{{ 'company.financialsTitle' | translate }}</h2>
    <p class="section-subtitle">{{ 'company.financialsSubtitle' | translate }}</p>
  </div>

  <form [formGroup]="form" (ngSubmit)="saveAndNext()">
    <div class="db-card">
      <div class="form-row">
        <div class="db-form-group">
          <label>{{ 'company.annualTurnoverLabel' | translate }} <span class="required">*</span></label>
          <input class="db-input" type="number" formControlName="annualTurnover" />
        </div>
        <div class="db-form-group">
          <label>{{ 'company.monthlyRevenueLabel' | translate }} <span class="required">*</span></label>
          <input class="db-input" type="number" formControlName="monthlyRevenue" />
        </div>
      </div>
      <div class="form-row">
        <div class="db-form-group">
          <label>{{ 'company.netProfitMarginLabel' | translate }} <span class="required">*</span></label>
          <input class="db-input" type="number" min="0" max="100" formControlName="netProfitMargin" />
        </div>
        <div class="db-form-group">
          <label>{{ 'company.yearsTradingLabel' | translate }} <span class="required">*</span></label>
          <input class="db-input" type="number" min="0" formControlName="yearsTrading" />
        </div>
      </div>
      <div class="db-form-group" style="max-width:360px">
        <label>{{ 'company.employeeCountLabel' | translate }} <span class="required">*</span></label>
        <input class="db-input" type="number" min="0" formControlName="employeeCount" />
      </div>
    </div>

    <div class="form-actions">
      <div></div>
      <button type="submit" class="db-btn db-btn--primary" [disabled]="saving()">
        {{ saving() ? ('wizard.saving' | translate) : ('wizard.saveContinue' | translate) }}
      </button>
    </div>
  </form>
</div>
<app-application-aside [appRef]="appRef()" [tip]="'aside.tip.financials' | translate"></app-application-aside>
</div>

<!-- Banker dense view -->
<div class="banker-dense-form" *ngIf="identity.isAssisting">
  <div class="db-card">
    <div class="card-header"><h3>{{ 'company.financialsTitle' | translate }}</h3></div>

    <form [formGroup]="form" (ngSubmit)="saveAndNext()">
      <div class="dense-grid">
        <div class="dense-field"><label>{{ 'company.annualTurnoverLabel' | translate }} <span class="required">*</span></label><input class="db-input" type="number" formControlName="annualTurnover" /></div>
        <div class="dense-field"><label>{{ 'company.monthlyRevenueLabel' | translate }} <span class="required">*</span></label><input class="db-input" type="number" formControlName="monthlyRevenue" /></div>
        <div class="dense-field"><label>{{ 'company.netProfitMarginLabel' | translate }} <span class="required">*</span></label><input class="db-input" type="number" min="0" max="100" formControlName="netProfitMargin" /></div>
        <div class="dense-field"><label>{{ 'company.yearsTradingLabel' | translate }} <span class="required">*</span></label><input class="db-input" type="number" min="0" formControlName="yearsTrading" /></div>
        <div class="dense-field"><label>{{ 'company.employeeCountLabel' | translate }} <span class="required">*</span></label><input class="db-input" type="number" min="0" formControlName="employeeCount" /></div>
      </div>

      <div class="dense-form-actions" *ngIf="!readOnly()">
        <button type="submit" class="db-btn db-btn--primary" [disabled]="saving()">
          {{ saving() ? ('wizard.saving' | translate) : ('wizard.saveContinue' | translate) }}
        </button>
      </div>
      <div class="db-alert db-alert--info mt-16" *ngIf="readOnly()">
        <span class="material-icons mi-sm">lock</span> {{ 'common.readOnlyNotice' | translate }}
      </div>
    </form>
  </div>
</div>
