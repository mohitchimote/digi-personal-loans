<div class="uw-shell">
  <header class="uw-header">
    <div class="uw-brand">
      <span class="material-icons mi-lg">verified_user</span>
      <span>{{ 'uw.brand' | translate }}</span>
    </div>
    <nav class="uw-nav">
      <a routerLink="/underwriter/pipeline" routerLinkActive="active">{{ 'uw.casePipeline' | translate }}</a>
    </nav>
    <div class="uw-search">
      <span class="material-icons mi-sm uw-search-icon">search</span>
      <input type="text" [ngModel]="searchQuery()" (ngModelChange)="searchQuery.set($event)" (focus)="onSearchFocus()" (blur)="onSearchBlur()"
             [placeholder]="'uw.searchPlaceholder' | translate" />
      <div class="uw-search-results" *ngIf="searchOpen() && searchQuery().trim().length >= 3">
        <div class="uw-search-empty" *ngIf="searchResults().length === 0">{{ 'uw.searchNoResults' | translate }}</div>
        <button type="button" class="uw-search-result" *ngFor="let app of searchResults()" (mousedown)="openResult(app)">
          <span class="material-icons mi-sm">description</span>
          <div class="uw-search-result-body">
            <strong>{{ searchLabel(app) }}</strong>
            <span>{{ app.applicationRef }} · {{ statusLabel(app.status) }}</span>
          </div>
        </button>
      </div>
    </div>
    <div class="uw-header-right">
      <app-language-switcher />
      <div class="header-user">
        <span class="user-avatar-sm">{{ (auth.userFullName || 'U')[0] }}</span>
        <div>
          <span class="header-name">{{ auth.userFullName }}</span>
          <span class="header-role">{{ ('role.' + auth.role) | translate }}</span>
        </div>
      </div>
      <button class="db-btn db-btn--ghost db-btn--sm" (click)="auth.logout()">{{ 'common.signOut' | translate }}</button>
    </div>
  </header>

  <div class="uw-content">
    <router-outlet />
  </div>
</div>
