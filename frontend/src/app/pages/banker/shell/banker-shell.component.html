<div class="uw-shell">
  <header class="uw-header">
    <div class="uw-brand">
      <span class="material-icons mi-lg">support_agent</span>
      <span>{{ 'banker.brand' | translate }}</span>
    </div>
    <nav class="uw-nav">
      <a routerLink="/banker/queue" routerLinkActive="active">{{ 'banker.queueTitle' | translate }}</a>
    </nav>
    <div class="uw-header-right">
      <app-language-switcher />
      <div class="header-user">
        <span class="user-avatar-sm">{{ (auth.userFullName || 'U')[0] }}</span>
        <span class="header-name">{{ auth.userFullName }}</span>
      </div>
      <button class="db-btn db-btn--ghost db-btn--sm" (click)="auth.logout()">{{ 'common.signOut' | translate }}</button>
    </div>
  </header>

  <div class="assisting-banner" *ngIf="assist.isActive">
    <span class="material-icons mi-sm">support_agent</span>
    {{ 'banker.assistingLabel' | translate }} <strong>{{ assist.current?.customerEmail }}</strong> · {{ assist.current?.appRef }}
    <button class="db-btn db-btn--ghost db-btn--sm" (click)="exitAssist()">{{ 'banker.exitAssist' | translate }}</button>
  </div>

  <div class="uw-content">
    <router-outlet />
  </div>
</div>
