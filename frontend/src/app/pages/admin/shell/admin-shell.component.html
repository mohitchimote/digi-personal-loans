<div class="uw-shell">
  <header class="uw-header">
    <div class="uw-brand">
      <span class="material-icons mi-lg">admin_panel_settings</span>
      <span>DigiBank Admin</span>
    </div>
    <nav class="uw-nav">
      <a routerLink="/admin/users" routerLinkActive="active">Users</a>
      <a routerLink="/admin/faqs" routerLinkActive="active">FAQs</a>
      <a routerLink="/admin/rules" routerLinkActive="active">Affordability Rules</a>
    </nav>
    <div class="uw-header-right">
      <div class="header-user">
        <span class="user-avatar-sm">{{ (auth.userFullName || 'U')[0] }}</span>
        <span class="header-name">{{ auth.userFullName }}</span>
      </div>
      <button class="db-btn db-btn--ghost db-btn--sm" (click)="auth.logout()">Logout</button>
    </div>
  </header>

  <div class="uw-content">
    <router-outlet />
  </div>
</div>
