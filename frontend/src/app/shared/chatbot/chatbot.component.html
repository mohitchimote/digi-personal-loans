<div class="chatbot-fab">
  <!-- Chat window -->
  <div class="chat-window" *ngIf="open()">
    <div class="chat-header">
      <div class="chat-avatar">🤖</div>
      <div>
        <div class="chat-title">DigiBot</div>
        <div class="chat-status">● Online</div>
      </div>
      <button class="chat-close" (click)="toggle()">✕</button>
    </div>

    <div class="chat-body">
      <div *ngFor="let msg of messages()"
           class="chat-msg" [class.bot]="msg.role === 'bot'" [class.user]="msg.role === 'user'">
        <div class="msg-bubble">{{ msg.text }}</div>
      </div>
    </div>

    <div class="chat-suggestions">
      <button (click)="input='What are your rates?'; send()">Rates</button>
      <button (click)="input='How much can I borrow?'; send()">Amounts</button>
      <button (click)="input='What documents do I need?'; send()">Documents</button>
    </div>

    <div class="chat-input">
      <input type="text" [(ngModel)]="input" (keyup)="onKey($event)"
             placeholder="Ask me anything…" />
      <button (click)="send()">➤</button>
    </div>
  </div>

  <!-- FAB button -->
  <button class="chatbot-bubble" (click)="toggle()" [title]="open() ? 'Close chat' : 'Chat with DigiBot'">
    {{ open() ? '✕' : '💬' }}
  </button>
</div>
